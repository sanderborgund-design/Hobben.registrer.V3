<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Høbben - Medlemssystem</title>
    <style>
        :root {
            --hobben-red: #e31b23;
            --dark: #121212;
            --card: #1e1e1e;
            --text: #ffffff;
            --green: #2ecc71;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--dark);
            color: var(--text);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            width: 100%;
            max-width: 500px;
            text-align: center;
            border: 1px solid #333;
        }

        .logo { max-width: 120px; margin-bottom: 15px; }
        h1 { color: var(--hobben-red); margin: 0 0 10px 0; letter-spacing: 2px; }
        
        input, select {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border-radius: 10px;
            border: 1px solid #444;
            background: #282828;
            color: white;
            box-sizing: border-box;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 16px;
            margin-top: 10px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s ease;
        }

        .btn-primary { background: var(--hobben-red); color: white; }
        .btn-primary:hover { background: #c1171d; transform: translateY(-2px); }
        .btn-secondary { background: #333; color: #ccc; }
        .btn-danger { background: #8e1a1a; color: white; font-size: 12px; padding: 8px; }

        .hidden { display: none; }
        
        /* Admin styling */
        .admin-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 1000; overflow-y: auto; padding: 20px;
            box-sizing: border-box;
        }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #1a1a1a; }
        th, td { padding: 12px; border: 1px solid #333; text-align: left; }
        th { background: var(--hobben-red); color: white; }
        
        .badge { padding: 4px 8px; border-radius: 5px; font-size: 12px; font-weight: bold; }
        .badge-in { background: var(--green); color: black; }
        .badge-out { background: #555; color: white; }

        .search-box { border-bottom: 2px solid var(--hobben-red); margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <img src="logo.png" alt="Høbben Logo" class="logo" onerror="this.style.display='none'">
    <h1>HØBBEN</h1>

    <div id="view-main">
        <p>Velkommen! Vennligst registrer deg eller sjekk inn.</p>
        <button class="btn-primary" onclick="showView('view-login')">SJEKK INN / UT</button>
        <button class="btn-secondary" onclick="showView('view-register')">LAG NY KONTO</button>
        <div style="margin-top: 40px;">
            <button class="btn-secondary" style="width: auto; padding: 10px 20px; font-size: 12px;" onclick="checkAdmin()">Admin Panel</button>
        </div>
    </div>

    <div id="view-register" class="hidden">
        <h2>Ny Medlem</h2>
        <input type="text" id="reg-name" placeholder="Fullt navn">
        <input type="date" id="reg-birth" title="Fødselsdato">
        <input type="tel" id="reg-p1" placeholder="Tlf foresatt 1 (Obligatorisk)">
        <input type="tel" id="reg-p2" placeholder="Tlf foresatt 2 (Valgfritt)">
        <button class="btn-primary" onclick="handleRegister()">OPPRETT KONTO</button>
        <button class="btn-secondary" onclick="showView('view-main')">TILBAKE</button>
    </div>

    <div id="view-login" class="hidden">
        <h2>Hvem er du?</h2>
        <input type="text" id="user-search" placeholder="Søk på navnet ditt..." oninput="filterUsers()">
        <select id="user-list" size="5"></select>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn-primary" style="background: var(--green); color: black;" onclick="updateStatus(true)">SJEKK INN</button>
            <button class="btn-primary" onclick="updateStatus(false)">SJEKK UT</button>
        </div>
        <button class="btn-secondary" onclick="showView('view-main')">TILBAKE</button>
    </div>

    <div id="view-admin" class="admin-modal hidden">
        <div style="max-width: 1000px; margin: 0 auto;">
            <h1>ADMIN DASHBOARD</h1>
            <div style="display: flex; justify-content: space-around; background: #222; padding: 20px; border-radius: 10px;">
                <div>INNE NÅ: <span id="stat-in" style="color: var(--green); font-size: 24px; font-weight: bold;">0</span></div>
                <div>TOTALT REGISTRERT: <span id="stat-total" style="font-size: 24px; font-weight: bold;">0</span></div>
            </div>
            
            <table>
                <thead>
                    <tr>
                        <th>Navn</th>
                        <th>Født</th>
                        <th>Foresatte</th>
                        <th>Status</th>
                        <th>Handling</th>
                    </tr>
                </thead>
                <tbody id="admin-table"></tbody>
            </table>
            
            <div style="margin-top: 20px; display: flex; gap: 10px;">
                <button class="btn-secondary" onclick="exportData()">Last ned backup (Excel/CSV)</button>
                <button class="btn-primary" onclick="showView('view-main')">LUKK ADMIN</button>
            </div>
        </div>
    </div>
</div>

<script>
    // System-data
    let users = JSON.parse(localStorage.getItem('hobben_db')) || [];
    const ADMIN_PASS = "133769";

    // Navigasjon
    function showView(id) {
        document.querySelectorAll('.container > div, .admin-modal').forEach(el => el.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        if(id === 'view-login') filterUsers();
    }

    // Registrering
    function handleRegister() {
        const name = document.getElementById('reg-name').value.trim();
        const birth = document.getElementById('reg-birth').value;
        const p1 = document.getElementById('reg-p1').value.trim();
        const p2 = document.getElementById('reg-p2').value.trim();

        if(!name || !birth || !p1) {
            alert("Feil: Navn, fødselsdato og minst ett foreldrenummer må fylles ut!");
            return;
        }

        const newUser = {
            id: Date.now(),
            name: name,
            birth: birth,
            p1: p1,
            p2: p2,
            active: false,
            joined: new Date().toLocaleDateString()
        };

        users.push(newUser);
        saveAndSync();
        alert("Konto for " + name + " er opprettet!");
        showView('view-main');
    }

    // Søk og Filter
    function filterUsers() {
        const search = document.getElementById('user-search').value.toLowerCase();
        const list = document.getElementById('user-list');
        list.innerHTML = "";
        
        const filtered = users
            .filter(u => u.name.toLowerCase().includes(search))
            .sort((a,b) => a.name.localeCompare(b.name));

        filtered.forEach(u => {
            const op = document.createElement('option');
            op.value = u.id;
            op.textContent = u.name + (u.active ? " (INNE)" : "");
            list.appendChild(op);
        });
    }

    // Inn- og utsjekk
    function updateStatus(status) {
        const id = document.getElementById('user-list').value;
        if(!id) return alert("Velg navnet ditt fra listen først!");

        const user = users.find(u => u.id == id);
        user.active = status;
        saveAndSync();
        
        alert(status ? "Velkommen inn, " + user.name : "Takk for besøket, " + user.name);
        document.getElementById('user-search').value = "";
        showView('view-main');
    }

    // Admin Logikk
    function checkAdmin() {
        if(prompt("Passord for Admin:") === ADMIN_PASS) {
            renderAdmin();
            showView('view-admin');
        } else {
            alert("Feil passord.");
        }
    }

    function renderAdmin() {
        const tbody = document.getElementById('admin-table');
        tbody.innerHTML = "";
        let inCount = 0;

        users.sort((a,b) => a.name.localeCompare(b.name)).forEach(u => {
            if(u.active) inCount++;
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${u.name}</td>
                <td>${u.birth}</td>
                <td>${u.p1}${u.p2 ? ' / '+u.p2 : ''}</td>
                <td><span class="badge ${u.active ? 'badge-in':'badge-out'}">${u.active ? 'INNE':'UTE'}</span></td>
                <td><button class="btn-danger" onclick="deleteUser(${u.id})">Slett</button></td>
            `;
            tbody.appendChild(tr);
        });

        document.getElementById('stat-in').textContent = inCount;
        document.getElementById('stat-total').textContent = users.length;
    }

    function deleteUser(id) {
        if(prompt("Skriv passord for å slette bruker:") === ADMIN_PASS) {
            users = users.filter(u => u.id !== id);
            saveAndSync();
            renderAdmin();
        }
    }

    function saveAndSync() {
        localStorage.setItem('hobben_db', JSON.stringify(users));
    }

    // Backup-funksjon (Laster ned en CSV-fil som kan åpnes i Excel)
    function exportData() {
        let csv = "Navn,Fødselsdato,Foreldre 1,Foreldre 2,Status\n";
        users.forEach(u => {
            csv += `${u.name},${u.birth},${u.p1},${u.p2},${u.active ? 'INNE':'UTE'}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.setAttribute('href', url);
        a.setAttribute('download', 'hobben_medlemmer.csv');
        a.click();
    }
</script>

</body>
</html>
